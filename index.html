<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetChat Pro | 100% Fixed</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --chat-bg: #1e293b; --text: #f1f5f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        .chat-container { width: 100%; max-width: 500px; background: var(--chat-bg); display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { padding: 20px; background: rgba(0,0,0,0.2); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.1)); }
        .msg { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .msg.sent { align-self: flex-end; background: var(--primary); border-bottom-right-radius: 4px; }
        .msg.received { align-self: flex-start; background: #334155; border-bottom-left-radius: 4px; }
        .sender { display: block; font-size: 0.7rem; font-weight: 800; margin-bottom: 4px; color: #94a3b8; }
        .input-area { padding: 20px; background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
        input { flex: 1; padding: 14px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; outline: none; }
        .send-btn { background: var(--primary); border: none; width: 50px; height: 50px; border-radius: 15px; color: white; cursor: pointer; }
        #login { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login">
        <h2 style="margin-bottom: 20px;">Live Chat Portal</h2>
        <input type="text" id="username" placeholder="Enter Your Name" style="width: 280px; margin-bottom: 15px;">
        <button onclick="startApp()" style="width: 280px; height: 55px; background: var(--primary); color: white; border: none; border-radius: 15px; font-weight: 800; cursor: pointer;">JOIN CHAT</button>
    </div>

    <div class="chat-container">
        <div class="header">
            <strong><i class="fas fa-circle" style="color:#22c55e; font-size:0.6rem;"></i> Global Chat</strong>
            <button onclick="location.reload()" style="background:none; border:none; color:#64748b; cursor:pointer;"><i class="fas fa-sync-alt"></i></button>
        </div>

        <div id="chat-box"></div>

        <form class="input-area" id="chat-form">
            <input type="text" id="msg-input" placeholder="Type a message..." autocomplete="off" required>
            <button type="submit" class="send-btn"><i class="fas fa-paper-plane"></i></button>
        </form>
    </div>

    <script>
        // *** APNAR SCRIPT URL EKHANE BOSHAN ***
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbws1AGTZnbOK8_ldTlqlWc4VSgdS7q5zPooql-8vdVfOChy6eUTNiZOQ8Xqw2vgUzHtlA/exec";
        
        let myName = "";
        let lastMessageCount = 0;

        function startApp() {
            const user = document.getElementById('username').value;
            if(user.trim()) {
                myName = user;
                document.getElementById('login').style.display = 'none';
                loadMessages();
                setInterval(loadMessages, 4000); // 4 sec refresh
            }
        }

        // SEND LOGIC
        document.getElementById('chat-form').onsubmit = async (e) => {
            e.preventDefault();
            const input = document.getElementById('msg-input');
            const msg = input.value;
            input.value = "";

            // Instant Local View
            appendMsg(myName, msg, 'sent');

            const formData = new FormData();
            formData.append('name', myName);     // Column A
            formData.append('email', 'ChatUser'); // Column B (Marker)
            formData.append('Massage', msg);    // Column C (Exact Header Match)

            await fetch(SCRIPT_URL, { method: 'POST', body: formData });
        };

        // LOAD LOGIC
        async function loadMessages() {
            try {
                const res = await fetch(SCRIPT_URL);
                const data = await res.json();
                
                // Filter only chat messages
                const chatData = data.filter(row => (row.Email === 'ChatUser' || row.email === 'ChatUser'));

                if (chatData.length !== lastMessageCount) {
                    const box = document.getElementById('chat-box');
                    box.innerHTML = "";
                    
                    chatData.forEach(row => {
                        // FIX: Massage, massage, person - jeta pabe shetai nibe
                        const text = row.Massage || row.massage || row.person || "Error Reading Message";
                        const sender = row.Name || row.name || "Guest";
                        appendMsg(sender, text, sender === myName ? 'sent' : 'received');
                    });
                    
                    lastMessageCount = chatData.length;
                    box.scrollTop = box.scrollHeight;
                }
            } catch (e) { console.error("Syncing..."); }
        }

        function appendMsg(user, text, type) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${type}`;
            div.innerHTML = `<span class="sender">${user}</span>${text}`;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
