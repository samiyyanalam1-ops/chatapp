<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SheetChat Pro | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #6366f1; --bg: #0f172a; --c: #1e293b; --online: #22c55e; 
            --link: #60a5fa; --mention: #fbbf24; --hash: #a5b4fc; --rec: #ef4444; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; height: 100dvh; overflow: hidden; }
        .app { width: 100%; max-width: 450px; background: var(--c); display: flex; flex-direction: column; height: 100%; position: relative; box-shadow: 0 0 50px rgba(0,0,0,0.5); display: none; }
        
        /* Login Screen */
        #log { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 15px; }
        .login-card { background: var(--c); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; gap: 15px; width: 80%; max-width: 320px; }
        .join-btn { width: 100%; padding: 15px; border-radius: 12px; background: var(--p); color: white; font-weight: bold; border: none; cursor: pointer; transition: 0.3s; }
        .error-msg { color: var(--rec); font-size: 0.8rem; display: none; margin-top: -10px; }
        
        /* Header & Online List */
        .hdr { padding: 12px 15px; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .hdr h1 { font-size: 0.9rem; margin: 0; text-transform: uppercase; letter-spacing: 1.5px; color: var(--p); }
        .online-bar { font-size: 0.65rem; color: var(--online); margin-top: 3px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
        #online-list { position: absolute; top: 60px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--p); border-radius: 10px; padding: 10px; width: 200px; display: none; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .user-tag { font-size: 0.75rem; padding: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); display: block; }
        
        /* Chat UI */
        #box { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 18px; scroll-behavior: smooth; }
        .msg-wrapper { display: flex; gap: 10px; max-width: 88%; animation: fadeIn 0.3s ease; }
        .sent-wrapper { align-self: flex-end; flex-direction: row-reverse; }
        .received-wrapper { align-self: flex-start; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .logout-btn { background: transparent; border: 0; color: red; cursor: pointer; }
        .pfp { width: 38px; height: 38px; border-radius: 12px; background: #0f172a; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1); }
        .msg { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; position: relative; }
        .sent { background: var(--p); color: white; border-top-right-radius: 2px; }
        .received { background: #334155; color: #e2e8f0; border-top-left-radius: 2px; }
        
        .msg-hdr { display: flex; justify-content: space-between; align-items: center; gap: 15px; margin-bottom: 4px; }
        .u { font-size: 0.7rem; opacity: 0.7; font-weight: 700; text-transform: lowercase; }
        
        .mention { color: var(--mention); font-weight: bold; }
        .hashtag { color: var(--hash); font-weight: bold; }
        .msg-content a { color: var(--link); text-decoration: underline; }
        .preview-img { max-width: 100%; border-radius: 10px; margin-top: 8px; display: block; border: 1px solid rgba(255,255,255,0.1); }
        
        .copy-btn { background: none; border: none; color: white; padding: 2px; cursor: pointer; font-size: 0.75rem; opacity: 0.4; }
        .del-btn { background: none; border: none; color: var(--rec); cursor: pointer; font-size: 1.1rem; padding: 5px; opacity: 0.6; }
        .del-btn:hover { opacity: 1; }
        
        #toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 30px; font-size: 0.85rem; z-index: 1000; display: none; border: 1px solid var(--p); }
        
        .input-area { padding: 15px; background: #0f172a; display: flex; gap: 10px; align-items: center; border-top: 1px solid rgba(255,255,255,0.05); }
        input { flex: 1; padding: 12px 18px; border-radius: 15px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; font-size: 16px; width: 100%; }
        .btn-round { background: var(--p); border: none; width: 45px; height: 45px; border-radius: 15px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .rec-active { background: var(--rec) !important; animation: pulse 1s infinite; border-radius: 50%; }
    </style>
</head>
<body>

    <div id="log">
        <div class="login-card">
            <i class="fas fa-lock" style="font-size: 3rem; color: var(--p); margin-bottom: 5px;"></i>
            <h2 style="color:white; letter-spacing: 2px; margin: 0;">SHEETCHAT <span style="color:var(--p)">PRO</span></h2>
            <p style="opacity: 0.5; font-size: 0.75rem;">Access Protected</p>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <div id="err" class="error-msg">Access Denied</div>
            <button onclick="handleAuth()" class="join-btn">LOGIN</button>
        </div>
    </div>

    <div id="toast">Action Successful!</div>

    <div class="app" id="mainApp">
        <div id="online-list"></div>
        <div class="hdr">
            <button class="logout-btn" onclick="logout()"><i class="fas fa-power-off"></i></button>
            <div class="hdr-info">
                <h1>Global Network</h1>
                <div class="online-bar" onclick="toggleOnlineList()">
                    <div class="dot" style="width:6px; height:6px; background:var(--online); border-radius:50%"></div> 
                    <span id="online-count">0 Active</span>
                </div>
            </div>
            <button class="del-btn" onclick="removeAllChat()"><i class="fas fa-trash-can"></i></button>
        </div>
        <div id="box"></div>
        <div class="input-area">
            <button id="voiceBtn" class="btn-round"><i class="fas fa-microphone"></i></button>
            <input type="text" id="m" placeholder="Write something..." autocomplete="off">
            <button id="sendBtn" class="btn-round"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const URL = "https://script.google.com/macros/s/AKfycbzWKw-mH395SgLUTumLTKkUb4jScCjzi4Qr7ujOhImdI6SLr2aNqiKa27Gw_h9pa50G/exec";
        const APP_PASS = "chatapp2026#";

        let myName = localStorage.getItem('sheetChatName') || "";
        let isAuth = localStorage.getItem('sheetChatAuth') === "true";
        let lastCount = 0;

        window.onload = () => { if(isAuth && myName) showApp(); };

        function handleAuth() {
            const u = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value;
            if(u && p === APP_PASS) {
                myName = u;
                localStorage.setItem('sheetChatName', u);
                localStorage.setItem('sheetChatAuth', "true");
                showApp();
            } else { document.getElementById('err').style.display = 'block'; }
        }

        function showApp() {
            document.getElementById('log').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            init();
        }

        function logout() { localStorage.clear(); location.reload(); }
        function init() { load(); setInterval(load, 3000); setInterval(heartbeat, 10000); heartbeat(); }

        function toggleOnlineList() {
            const list = document.getElementById('online-list');
            list.style.display = list.style.display === 'block' ? 'none' : 'block';
        }

        async function removeAllChat() {
            const confirmPass = prompt("WARNING: This will delete ALL chat history. Enter Password to confirm:");
            if (confirmPass === APP_PASS) {
                showToast("Clearing Database...");
                const fd = new FormData();
                fd.append('name', 'SYSTEM');
                fd.append('email', 'ChatUser');
                fd.append('Massage', 'CLEAR_HISTORY'); // This command must be handled by your Google Script
                await fetch(URL, { method: 'POST', body: fd });
                location.reload();
            } else { alert("Wrong password."); }
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg; t.style.display = 'block'; setTimeout(() => t.style.display='none', 3000);
        }

        function parseText(text) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            return text.replace(urlRegex, (url) => {
                if (url.match(/\.(jpeg|jpg|gif|png|webp)$/i)) {
                    return `<a href="${url}" target="_blank">${url}</a><img src="${url}" class="preview-img">`;
                }
                return `<a href="${url}" target="_blank">${url}</a>`;
            }).replace(/(@\w+)/g, '<span class="mention">$1</span>').replace(/(#\w+)/g, '<span class="hashtag">$1</span>');
        }

        async function postData(content) {
            if(!content.trim()) return;
            const fd = new FormData();
            fd.append('name', myName); fd.append('email', 'ChatUser'); fd.append('Massage', content);
            fetch(URL, { method: 'POST', body: fd });
            document.getElementById('m').value = "";
        }

        async function load() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                const chats = data.filter(r => r[2] === 'ChatUser');
                
                if (chats.length !== lastCount) {
                    const box = document.getElementById('box');
                    box.innerHTML = "";
                    chats.forEach(r => {
                        const type = r[1] === myName ? 'sent' : 'received';
                        const isVC = r[3].startsWith("VC:data:audio");
                        const content = isVC ? `<audio controls src="${r[3].split('VC:')[1]}"></audio>` : parseText(r[3]);
                        const wrap = document.createElement('div');
                        wrap.className = `msg-wrapper ${type}-wrapper`;
                        wrap.innerHTML = `
                            <img src="https://api.dicebear.com/7.x/identicon/svg?seed=${r[1]}" class="pfp">
                            <div class="msg ${type}">
                                <div class="msg-hdr"><span class="u">${r[1]}</span></div>
                                <div class="msg-content">${content}</div>
                            </div>`;
                        box.appendChild(wrap);
                    });
                    lastCount = chats.length;
                    box.scrollTop = box.scrollHeight;
                }
                
                const onlineUsers = [...new Set(data.filter(r => r[2] === 'StatusUpdate').map(r => r[1]))];
                document.getElementById('online-count').innerText = `${onlineUsers.length} Active`;
                document.getElementById('online-list').innerHTML = onlineUsers.map(u => `<span class="user-tag"><i class="fas fa-circle" style="color:var(--online); font-size:6px"></i> ${u}</span>`).join('');
                
            } catch (e) {}
        }

        async function heartbeat() {
            if(!myName || !isAuth) return;
            const fd = new FormData();
            fd.append('name', myName); fd.append('email', 'StatusUpdate'); fd.append('Massage', 'ping');
            fetch(URL, { method: 'POST', body: fd });
        }

        document.getElementById('sendBtn').onclick = () => postData(document.getElementById('m').value);
        document.getElementById('m').onkeypress = (e) => { if(e.key === 'Enter') postData(e.target.value); };
    </script>
</body>
</html>
