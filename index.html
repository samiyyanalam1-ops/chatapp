<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SheetChat Pro | 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --p: #6366f1; --bg: #0f172a; --c: #1e293b; --online: #22c55e; 
            --link: #60a5fa; --rec: #ef4444; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; justify-content: center; height: 100dvh; overflow: hidden; }
        .app { width: 100%; max-width: 450px; background: var(--c); display: flex; flex-direction: column; height: 100%; position: relative; }
        
        /* Header */
        .hdr { padding: 12px 15px; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        .hdr-info { flex: 1; text-align: center; }
        .hdr h1 { font-size: 0.9rem; margin: 0; text-transform: uppercase; letter-spacing: 1.5px; color: var(--p); }
        
        /* Buttons */
        .icon-btn { background: #334155; color: white; border: none; cursor: pointer; width: 35px; height: 35px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .icon-btn:hover { background: var(--p); }
        .btn-clear:hover { background: var(--rec) !important; }

        /* Chat Area */
        #box { flex: 1; overflow-y: auto; padding: 20px 15px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg-wrapper { display: flex; gap: 10px; max-width: 85%; animation: fadeIn 0.3s ease; }
        .sent-wrapper { align-self: flex-end; flex-direction: row-reverse; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .pfp { width: 35px; height: 35px; border-radius: 10px; background: #0f172a; }
        .msg { padding: 10px 14px; border-radius: 15px; font-size: 0.95rem; line-height: 1.4; position: relative; }
        .sent { background: var(--p); border-top-right-radius: 2px; }
        .received { background: #334155; border-top-left-radius: 2px; }
        .u { font-size: 0.7rem; opacity: 0.6; font-weight: bold; margin-bottom: 3px; display: block; }

        /* Input */
        .input-area { padding: 15px; background: #0f172a; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #334155; background: #1e293b; color: white; outline: none; }
        .btn-send { background: var(--p); border: none; width: 45px; height: 45px; border-radius: 12px; color: white; cursor: pointer; }
        
        /* Login */
        #log { position: fixed; inset: 0; background: var(--bg); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        #log input { width: 260px; padding: 15px; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; }
    </style>
</head>
<body>

    <div id="log">
        <i class="fas fa-ghost" style="font-size: 3rem; color: var(--p)"></i>
        <h2 style="letter-spacing: 2px;">SHEETCHAT <span style="color:var(--p)">PRO</span></h2>
        <input type="text" id="user" placeholder="Enter username...">
        <button onclick="join()" style="width: 260px; padding: 15px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer;">START CHATTING</button>
    </div>

    <div class="app">
        <div class="hdr">
            <button class="icon-btn" onclick="logout()"><i class="fas fa-power-off"></i></button>
            <div class="hdr-info">
                <h1>Secure Cloud</h1>
                <div style="font-size: 0.6rem; color: var(--online);"><i class="fas fa-circle" style="font-size: 5px;"></i> Connected</div>
            </div>
            <button class="icon-btn btn-clear" onclick="clearChat()" title="Clear All Data"><i class="fas fa-trash-alt"></i></button>
        </div>
        
        <div id="box"></div>

        <div class="input-area">
            <input type="text" id="m" placeholder="Message..." autocomplete="off">
            <button onclick="sendMsg()" class="btn-send"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        // YOUR NEW DEPLOYMENT URL
        const URL = "https://script.google.com/macros/s/AKfycbw1JxWUXq9ivL4MPsFMMMQVLR381l5B3iYDNvHa9bLPx6lHek6aIjy_AmBuQd2r_oOE/exec";
        
        let myName = localStorage.getItem('sheetChatName') || "";
        let lastCount = 0;

        window.onload = () => { if(myName) { document.getElementById('log').style.display = 'none'; init(); } };

        function join() {
            const val = document.getElementById('user').value.trim();
            if(val) { myName = val; localStorage.setItem('sheetChatName', myName); document.getElementById('log').style.display = 'none'; init(); }
        }

        function logout() { localStorage.removeItem('sheetChatName'); location.reload(); }

        function init() { load(); setInterval(load, 3000); }

        async function sendMsg() {
            const i = document.getElementById('m');
            const txt = i.value.trim();
            if(!txt) return;
            
            appendUI(myName, txt, 'sent');
            i.value = "";

            const fd = new FormData();
            fd.append('name', myName);
            fd.append('email', 'ChatUser');
            fd.append('Massage', txt);
            
            try { await fetch(URL, { method: 'POST', body: fd }); } catch(e) {}
        }

        async function clearChat() {
            if(!confirm("Wipe all messages from the spreadsheet?")) return;
            const fd = new FormData();
            fd.append('mode', 'clear');
            try {
                await fetch(URL, { method: 'POST', body: fd });
                document.getElementById('box').innerHTML = "";
                lastCount = 0;
            } catch(e) { alert("Clear failed."); }
        }

        async function load() {
            try {
                const res = await fetch(URL);
                const data = await res.json();
                const chats = data.filter(r => r[1] === 'ChatUser');
                
                if (chats.length !== lastCount) {
                    const box = document.getElementById('box');
                    box.innerHTML = "";
                    chats.forEach(r => appendUI(r[0], r[2], r[0] === myName ? 'sent' : 'received'));
                    lastCount = chats.length;
                    box.scrollTop = box.scrollHeight;
                }
            } catch (e) {}
        }

        function appendUI(u, t, type) {
            const box = document.getElementById('box');
            const wrap = document.createElement('div');
            wrap.className = `msg-wrapper ${type}-wrapper`;
            const pfp = `https://api.dicebear.com/7.x/identicon/svg?seed=${encodeURIComponent(u)}`;
            
            wrap.innerHTML = `
                <img src="${pfp}" class="pfp">
                <div class="msg ${type}">
                    <span class="u">${u}</span>
                    <div class="msg-content">${t}</div>
                </div>`;
            box.appendChild(wrap);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
